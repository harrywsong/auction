services:
  postgres:
    image: postgres:14-alpine
    container_name: auction_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auction_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: auction_server
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auction_db
      ADMIN_KEY: admin123
    ports:
      - '4001:4001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
    command: npm run dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: auction_client
    environment:
      VITE_API_URL: http://40.233.95.61:4001
      VITE_WS_URL: http://40.233.95.61:4001
      VITE_ADMIN_KEY: admin123
    ports:
      - '5173:5173'
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src
    command: npm run dev

volumes:
  pgdata:
